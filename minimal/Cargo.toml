[package]
name = "starter-minimal"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
floz = { path = "../../floz", features = ["default"] }
tokio = { workspace = true, features = ["full", "macros"] }
ntex = { workspace = true }
tracing = { workspace = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
